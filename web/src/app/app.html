<header class="topbar">
  <div class="brand">
    <span class="logo">🏊</span>
    <div>
      <select class="meet-select" (change)="div.switchMeet($any($event.target).value)">
        @for (m of div.meets(); track m.code) {
          <option [value]="m.code" [selected]="m.code === div.meet()">{{ m.name }}</option>
        }
      </select>
      @if (data.data()?.meet; as m) {
        <div class="meet-sub">{{ m.facility }} · {{ m.start_date }} – {{ m.end_date }}</div>
      }
    </div>
  </div>

  <div class="division-switch">
    <a [routerLink]="div.otherRoute('CHAMP')" [class.active]="div.division() === 'CHAMP'">Championship</a>
    <a [routerLink]="div.otherRoute('OPEN')" [class.active]="div.division() === 'OPEN'">Open</a>
  </div>

  <nav class="nav">
    @for (item of nav(); track item.seg) {
      <a [routerLink]="item.link" routerLinkActive="active">{{ item.label }}</a>
    }
  </nav>
</header>

<main class="content">
  @if (data.loading()) {
    <div class="state">Loading meet data…</div>
  } @else if (data.error()) {
    <div class="state error">Failed to load data: {{ data.error() }}</div>
  } @else {
    <router-outlet />
  }
</main>
